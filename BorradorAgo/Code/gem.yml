openapi: 3.0.3
info:
  title: Smart Mate IoT API
  version: 1.0.0
  description: >
    Backend API for the Smart Mate IoT project (UNC - Software Engineering).
    This API handles real-time telemetry, user events, session management, 
    calculated metrics, and system alerts.

servers:
  - url: http://localhost:8080/api/v1
    description: Local development server

tags:
  - name: Telemetry
    description: Real-time sensor data from ESP32
  - name: Events
    description: Discrete user actions (buttons, switches)
  - name: Metrics
    description: Data processed by backend algorithms
  - name: Sessions
    description: Management of active/closed drinking sessions
  - name: Alerts
    description: Notifications and anomaly detections
  - name: LiveFeed
    description: High-frequency data for real-time dashboard

paths:
  /telemetry:
    get:
      tags: [Telemetry]
      summary: Get all historical telemetry
      responses:
        '200':
          description: List of telemetry readings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TelemetryResponse'
    post:
      tags: [Telemetry]
      summary: Ingest new telemetry from device
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TelemetryRequest'
      responses:
        '201':
          description: Telemetry persisted
        '400':
          $ref: '#/components/responses/400'

  /telemetry/latest:
    get:
      tags: [Telemetry]
      summary: Get the most recent telemetry readings
      responses:
        '200':
          description: Latest readings for live charts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TelemetryResponse'

  /events:
    get:
      tags: [Events]
      summary: List all events
      responses:
        '200':
          description: History of events
    post:
      tags: [Events]
      summary: Register a new event (e.g. POUR_MATE)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventRequest'
      responses:
        '201':
          description: Event recorded

  /events/{id}:
    get:
      tags: [Events]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Event detail
        '404':
          $ref: '#/components/responses/404'

  /events/type/{type}:
    get:
      tags: [Events]
      parameters:
        - name: type
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Events filtered by type

  /metrics:
    get:
      tags: [Metrics]
      summary: List all calculated metrics
      responses:
        '200':
          description: Metrics history

  /metrics/type/{type}:
    get:
      tags: [Metrics]
      parameters:
        - name: type
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Metrics filtered by type

  /metrics/latest/{type}:
    get:
      tags: [Metrics]
      summary: Get the last calculated value of a metric
      parameters:
        - name: type
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Latest metric value

  /sessions:
    get:
      tags: [Sessions]
      summary: Get historical mate sessions
      responses:
        '200':
          description: List of sessions

  /sessions/active:
    get:
      tags: [Sessions]
      summary: Get the current active session (if any)
      responses:
        '200':
          description: Active session data
        '404':
          description: No active session found

  /sessions/{id}:
    get:
      tags: [Sessions]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Session detail

  /alerts:
    get:
      tags: [Alerts]
      responses:
        '200':
          description: All system alerts

  /alerts/unacknowledged:
    get:
      tags: [Alerts]
      summary: Get alerts not yet seen by the user
      responses:
        '200':
          description: Unseen alerts

  /alerts/{id}/acknowledge:
    put:
      tags: [Alerts]
      summary: Mark an alert as seen
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Alert acknowledged

  /live/telemetry:
    get:
      tags: [LiveFeed]
      summary: Real-time telemetry stream (Polling endpoint)
      responses:
        '200':
          description: Single latest data point for live UI

components:
  schemas:
    TelemetryRequest:
      type: object
      required: [temperature, targetTemperature, deviceId]
      properties:
        temperature:
          type: number
          example: 78.5
        targetTemperature:
          type: number
          example: 80.0
        deviceId:
          type: string
          example: "ESP32-NODE-01"

    TelemetryResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        temperature:
          type: number
        targetTemperature:
          type: number
        timestamp:
          type: string
          format: date-time

    EventRequest:
      type: object
      required: [type, deviceId]
      properties:
        type:
          type: string
          enum: [POUR_MATE, HEATING_STARTED, HEATING_STOPPED, TARGET_CHANGED, SYSTEM_STARTED, SYSTEM_STOPPED]
        deviceId:
          type: string

    EventResponse:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
        timestamp:
          type: string
          format: date-time

    MetricResponse:
      type: object
      properties:
        metricType:
          type: string
        value:
          type: number
        unit:
          type: string
        createdAt:
          type: string
          format: date-time

    MateSessionResponse:
      type: object
      properties:
        id:
          type: integer
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        totalPours:
          type: integer
        averageTemperature:
          type: number
        status:
          type: string
          enum: [ACTIVE, CLOSED]

    SystemAlertResponse:
      type: object
      properties:
        id:
          type: integer
        alertType:
          type: string
        message:
          type: string
        severity:
          type: string
        triggeredAt:
          type: string
          format: date-time
        acknowledged:
          type: boolean

  responses:
    400:
      description: Bad Request - Invalid input or validation failed
    404:
      description: Not Found - Resource does not exist
    500:
      description: Internal Server Error