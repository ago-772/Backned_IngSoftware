openapi: 3.0.3
info:
  title: Smart Mate IoT - Backend API
  description: API for managing mate telemetry, events, and sessions.
  version: 1.0.0

paths:
  /api/v1/telemetry:
    post:
      summary: Ingest telemetry from ESP32
      description: Captures water temperature and potentiometer target.
      tags: [Telemetry]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TelemetryRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TelemetryResponse'
        '400':
          description: Invalid payload (Constraint 2.5)

    get:
      summary: Get historical telemetry
      tags: [Telemetry]
      responses:
        '200':
          description: List of historical readings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TelemetryResponse'

  /api/v1/events:
    post:
      summary: Register a discrete event
      description: Used for POUR_MATE, TARGET_CHANGED, etc.
      tags: [Events]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventRequest'
      responses:
        '201':
          description: Event recorded
          
  /api/v1/alerts:
    get:
      summary: Get active alerts
      tags: [Alerts]
      responses:
        '200':
          description: List of system-generated alerts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AlertResponse'

components:
  schemas:
    TelemetryRequest:
      type: object
      required: [temperature, targetTemperature, deviceId]
      properties:
        temperature:
          type: number
          format: double
          example: 75.5
        targetTemperature:
          type: number
          format: double
          example: 80.0
        deviceId:
          type: string
          example: "ESP32-MATE-01"

    TelemetryResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        temperature:
          type: number
        targetTemperature:
          type: number
        timestamp:
          type: string
          format: date-time

    EventRequest:
      type: object
      required: [type, deviceId]
      properties:
        type:
          type: string
          enum: [POUR_MATE, HEATING_STARTED, HEATING_STOPPED, TARGET_CHANGED]
        deviceId:
          type: string

    AlertResponse:
      type: object
      properties:
        alertType:
          type: string
        message:
          type: string
        severity:
          type: string
          enum: [INFO, WARNING, CRITICAL]
        triggeredAt:
          type: string
          format: date-time