openapi: 3.0.3

info:
  title: Mate Heater IoT API
  version: 1.0.0
  description: >
    REST API for the Mate Heater IoT system.
    Handles telemetry ingestion from the ESP32, event tracking,
    algorithm-generated metrics, mate session management,
    system alerts, and live feed for the frontend.

servers:
  - url: http://localhost:8080
    description: Local development server

tags:
  - name: Telemetry
    description: Temperature readings sent periodically by the ESP32
  - name: Events
    description: Discrete actions reported by the ESP32 (brews, heating, etc.)
  - name: Metrics
    description: Algorithm-computed outputs (cooling rate, moving average, predictions)
  - name: Sessions
    description: Mate sessions inferred by the backend from incoming events
  - name: Alerts
    description: System alerts generated by the backend when thresholds are exceeded
  - name: LiveFeed
    description: Polling endpoint for real-time frontend updates

# -----------------------------------------------------------------------------
# PATHS
# -----------------------------------------------------------------------------
paths:

  # --- Telemetry ---

  /telemetry:
    post:
      tags: [Telemetry]
      summary: Ingest a new telemetry reading from the ESP32
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TelemetryRequest'
            example:
              temperature: 75.3
              targetTemperature: 80.0
      responses:
        '201':
          description: Reading persisted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TelemetryResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

    get:
      tags: [Telemetry]
      summary: Retrieve all telemetry readings ordered by most recent first
      responses:
        '200':
          description: List of telemetry readings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TelemetryResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /telemetry/latest:
    get:
      tags: [Telemetry]
      summary: Retrieve the most recent telemetry reading
      responses:
        '200':
          description: Latest telemetry reading
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TelemetryResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # --- Events ---

  /events:
    post:
      tags: [Events]
      summary: Ingest a new discrete event from the ESP32
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventRequest'
            example:
              type: POUR_MATE
              deviceId: esp32-mate-01
      responses:
        '201':
          description: Event persisted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

    get:
      tags: [Events]
      summary: Retrieve all events ordered by most recent first
      responses:
        '200':
          description: List of events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EventResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /events/type/{type}:
    get:
      tags: [Events]
      summary: Retrieve all events of a given type
      parameters:
        - name: type
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/EventType'
          example: POUR_MATE
      responses:
        '200':
          description: List of events of the given type
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EventResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /events/count/{type}:
    get:
      tags: [Events]
      summary: Retrieve the total count of events of a given type
      parameters:
        - name: type
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/EventType'
          example: POUR_MATE
      responses:
        '200':
          description: Total count
          content:
            application/json:
              schema:
                type: integer
                example: 42
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # --- Metrics ---

  /metrics:
    get:
      tags: [Metrics]
      summary: Retrieve all computed metrics ordered by most recent first
      responses:
        '200':
          description: List of metrics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MetricResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /metrics/type/{type}:
    get:
      tags: [Metrics]
      summary: Retrieve all metrics of a given type
      parameters:
        - name: type
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/MetricType'
          example: COOLING_RATE
      responses:
        '200':
          description: List of metrics of the given type
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MetricResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /metrics/latest/{type}:
    get:
      tags: [Metrics]
      summary: Retrieve the most recent metric of a given type
      parameters:
        - name: type
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/MetricType'
          example: TEMP_DROP_PREDICTION
      responses:
        '200':
          description: Latest metric of the given type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetricResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # --- Sessions ---

  /sessions:
    get:
      tags: [Sessions]
      summary: Retrieve all mate sessions ordered by most recent first
      responses:
        '200':
          description: List of mate sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MateSessionResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /sessions/active:
    get:
      tags: [Sessions]
      summary: Retrieve the currently active mate session if one exists
      responses:
        '200':
          description: Active session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MateSessionResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /sessions/{id}:
    get:
      tags: [Sessions]
      summary: Retrieve a mate session by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
          example: 1
      responses:
        '200':
          description: Mate session found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MateSessionResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # --- Alerts ---

  /alerts:
    get:
      tags: [Alerts]
      summary: Retrieve all system alerts ordered by most recent first
      responses:
        '200':
          description: List of all alerts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SystemAlertResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /alerts/unacknowledged:
    get:
      tags: [Alerts]
      summary: Retrieve all unacknowledged alerts
      responses:
        '200':
          description: List of unacknowledged alerts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SystemAlertResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /alerts/severity/{severity}:
    get:
      tags: [Alerts]
      summary: Retrieve all alerts of a given severity
      parameters:
        - name: severity
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/AlertSeverity'
          example: CRITICAL
      responses:
        '200':
          description: List of alerts of the given severity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SystemAlertResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /alerts/{id}/acknowledge:
    patch:
      tags: [Alerts]
      summary: Mark an alert as acknowledged
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
          example: 3
      responses:
        '200':
          description: Alert acknowledged successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemAlertResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # --- LiveFeed ---

  /live/telemetry:
    get:
      tags: [LiveFeed]
      summary: Retrieve the latest telemetry reading held in memory for live display
      description: >
        Polled periodically by the frontend to display live sensor data
        without manual page refresh. Returns the last reading received from the ESP32.
      responses:
        '200':
          description: Latest in-memory telemetry reading
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TelemetryResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

# -----------------------------------------------------------------------------
# COMPONENTS
# -----------------------------------------------------------------------------
components:

  schemas:

    # --- Requests ---

    TelemetryRequest:
      type: object
      required: [temperature, targetTemperature]
      properties:
        temperature:
          type: number
          format: double
          minimum: 0.0
          maximum: 100.0
          description: Current water temperature in °C
          example: 75.3
        targetTemperature:
          type: number
          format: double
          minimum: 50.0
          maximum: 90.0
          description: Desired temperature set via potentiometer in °C
          example: 80.0

    EventRequest:
      type: object
      required: [type, deviceId]
      properties:
        type:
          $ref: '#/components/schemas/EventType'
        deviceId:
          type: string
          maxLength: 128
          description: Identifier of the originating ESP32 device
          example: esp32-mate-01

    # --- Responses ---

    TelemetryResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        temperature:
          type: number
          format: double
          example: 75.3
        targetTemperature:
          type: number
          format: double
          example: 80.0
        timestamp:
          type: string
          format: date-time
          example: '2025-05-11T14:32:00Z'

    EventResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        type:
          $ref: '#/components/schemas/EventType'
        deviceId:
          type: string
          example: esp32-mate-01
        timestamp:
          type: string
          format: date-time
          example: '2025-05-11T14:33:00Z'

    MetricResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        type:
          $ref: '#/components/schemas/MetricType'
        value:
          type: number
          format: double
          example: -1.5
        unit:
          type: string
          example: °C/min
        createdAt:
          type: string
          format: date-time
          example: '2025-05-11T14:32:05Z'

    MateSessionResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        startTime:
          type: string
          format: date-time
          example: '2025-05-11T14:00:00Z'
        endTime:
          type: string
          format: date-time
          nullable: true
          example: '2025-05-11T14:45:00Z'
        totalPours:
          type: integer
          example: 6
        averageTemperature:
          type: number
          format: double
          nullable: true
          example: 78.4
        status:
          $ref: '#/components/schemas/SessionStatus'

    SystemAlertResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        alertType:
          $ref: '#/components/schemas/AlertType'
        message:
          type: string
          example: Water temperature dropped below target: 72.0°C
        severity:
          $ref: '#/components/schemas/AlertSeverity'
        triggeredAt:
          type: string
          format: date-time
          example: '2025-05-11T14:35:00Z'
        acknowledged:
          type: boolean
          example: false

    # --- Enums ---

    EventType:
      type: string
      enum:
        - POUR_MATE
        - HEATING_STARTED
        - HEATING_STOPPED
        - TARGET_TEMPERATURE_CHANGED
        - SYSTEM_STARTED
        - SYSTEM_STOPPED

    MetricType:
      type: string
      enum:
        - COOLING_RATE
        - TEMP_DROP_PREDICTION
        - BREW_INTERVAL
        - SESSION_BREW_COUNT
        - SESSION_AVG_TEMPERATURE

    SessionStatus:
      type: string
      enum:
        - ACTIVE
        - CLOSED

    AlertType:
      type: string
      enum:
        - TARGET_TEMPERATURE_REACHED
        - WATER_TOO_COLD
        - WATER_OVERHEATED
        - RAPID_COOLING_DETECTED
        - TEMPERATURE_SENSOR_ERROR
        - INVALID_SENSOR_VALUE
        - NO_TELEMETRY_RECEIVED
        - SESSION_STARTED
        - SESSION_FINISHED
        - HIGH_MATE_ACTIVITY
        - LOW_WATER_WARNING

    AlertSeverity:
      type: string
      enum:
        - INFO
        - WARNING
        - CRITICAL

  # --- Reusable responses ---

  responses:
    BadRequest:
      description: Invalid request payload or parameter
      content:
        application/json:
          schema:
            type: object
            properties:
              status:
                type: integer
                example: 400
              error:
                type: string
                example: Bad Request
              message:
                type: string
                example: temperature must be between 0.0 and 100.0

    NotFound:
      description: Requested resource not found
      content:
        application/json:
          schema:
            type: object
            properties:
              status:
                type: integer
                example: 404
              error:
                type: string
                example: Not Found
              message:
                type: string
                example: No telemetry reading found

    InternalServerError:
      description: Unexpected server error
      content:
        application/json:
          schema:
            type: object
            properties:
              status:
                type: integer
                example: 500
              error:
                type: string
                example: Internal Server Error
              message:
                type: string
                example: An unexpected error occurred