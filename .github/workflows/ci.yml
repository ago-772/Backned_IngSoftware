name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  backend:
    name: Backend - Build & Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build and test
        working-directory: backend/spring/final-project
        run: ./gradlew build test
