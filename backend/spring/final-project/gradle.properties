# Spring Boot 3.5’s Gradle plugin is resolved using the JVM that runs Gradle — not only
# whatever `java` is first on your PATH. That JVM must be 17+ (this project targets 21).
#
# If you see: "This build uses a Java 11 JVM" but `java -version` shows 21, JAVA_HOME is
# still pointing at JDK 11. Point it at JDK 21 and restart daemons:
#
#   Linux (symlinked `java` on PATH):
#     export JAVA_HOME="$(dirname "$(dirname "$(readlink -f "$(command -v java)")")")"
#   macOS:
#     export JAVA_HOME="$(/usr/libexec/java_home -v 21)"
#
#   ./gradlew --stop
#   ./gradlew test
#
# SDKMAN: `sdk use java <21.x>` (or `sdk default java <21.x>`) sets JAVA_HOME under
# ~/.sdkman/candidates/java/ — use that before ./gradlew.

org.gradle.jvmargs=-Xmx1024m -Dfile.encoding=UTF-8
