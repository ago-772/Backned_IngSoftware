# Values default to monorepo Docker Postgres (see root .env.example). Override via environment or IDE run config.
spring.application.name=iot-sensors-api

# SPRING_PORT from monorepo .env (bootRun loads ../../.. /.env); SERVER_PORT is Spring Boot’s usual env name
server.port=${SPRING_PORT:${SERVER_PORT:8080}}

# Use monorepo PostgreSQL (not the optional compose.yaml in this module)
spring.docker.compose.enabled=false

spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:soft_eng_db}
spring.datasource.username=${POSTGRES_USER:soft_eng_user}
spring.datasource.password=${POSTGRES_PASSWORD:dev_password_2026}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml

management.endpoints.web.exposure.include=health,info

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

