# ============================================================
#  API CONTRACT  –  IoT Mate Device
# ============================================================

# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
# TELEMETRY
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~

# ===== REQUESTS =====
TelemetryRequest:
  temperature: number         # 0.0 – 100.0
  targetTemperature: number   # 10.0 – 90.0
  waterLevel: number          # 0.0 – 100.0

# ===== RESPONSES =====
TelemetryResponse:
  id: number
  temperature: number
  targetTemperature: number
  waterLevel: number
  createdAt: string           # ISO 8601, ej: "2026-05-31T12:00:00Z"

# ===== ENDPOINTS =====
# POST /telemetry → 201 | 400
PostTelemetry:
  body: TelemetryRequest
  returns: TelemetryResponse

# GET /telemetry → 200
GetTelemetry:
  returns: TelemetryResponse[]

# GET /telemetry/latest → 200 | 404
GetLatestTelemetry:
  returns: TelemetryResponse | null


# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
# EVENTS
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~

# ===== REQUESTS =====
EventRequest:
  type: EventType             # requerido

EventType:
  - SYSTEM_STOPPED
  - SYSTEM_STARTED
  - HEATING_STARTED
  - HEATING_STOPPED

# ===== RESPONSES =====
EventResponse:
  id: number
  type: EventType
  timestamp: string           # ISO 8601, ej: "2026-05-31T12:00:00Z"
  deviceId: string

# ===== ENDPOINTS =====
# POST /events → 201 | 400
PostEvent:
  body: EventRequest
  returns: EventResponse

# GET /events → 200
GetEvents:
  returns: EventResponse[]

# GET /events/latest → 200 | 404
GetLatestEvent:
  returns: EventResponse | null


# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
# MATE SESSION
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~

# ===== REQUESTS =====
MateSessionRequest:
  sessionType: SessionType    # requerido
  totalPours: number | null   # opcional, cantidad de cebadas de la sesión

SessionType:
  - SYSTEM_STARTED
  - SYSTEM_STOPPED

# ===== RESPONSES =====
MateSessionResponse:
  id: number
  sessionType: SessionType
  totalPours: number | null
  createdAt: string           # ISO 8601, ej: "2026-05-31T12:00:00Z"

# ===== ENDPOINTS =====
# POST /sessions → 201 | 400
PostMateSession:
  body: MateSessionRequest
  returns: MateSessionResponse

# GET /sessions → 200
GetMateSessions:
  returns: MateSessionResponse[]

# GET /sessions/latest → 200 | 404
GetLatestMateSession:
  returns: MateSessionResponse | null
