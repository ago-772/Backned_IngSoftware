# ============================================================
#  API CONTRACT  –  IoT Mate Device
# ============================================================

# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
# TELEMETRY
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~

# ===== REQUESTS =====
TelemetryRequest:
  temperature: number         # 0.0 – 100.0
  targetTemperature: number   # 10.0 – 90.0
  waterLevel: number          # 0.0 – 100.0

# ===== RESPONSES =====
TelemetryResponse:
  id: number
  temperature: number
  targetTemperature: number
  waterLevel: number
  sessionId: number           # ID of the active session this reading belongs to
  createdAt: string           # ISO 8601, e.g. "2026-05-31T12:00:00Z"

# ===== ENDPOINTS =====
# POST /telemetry → 201 | 400
PostTelemetry:
  body: TelemetryRequest
  returns: TelemetryResponse
  errors:
    400: Validation failed (field errors map)
    409: No active session found (IllegalStateException)

# GET /telemetry → 200
GetTelemetry:
  returns: TelemetryResponse[]     # ordered by createdAt DESC

# GET /telemetry/latest → 200 | 404
GetLatestTelemetry:
  returns: TelemetryResponse | 404


# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
# EVENTS
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~

# ===== REQUESTS =====
EventRequest:
  type: EventType             # required

EventType:
  - POUR_MATE                 # user pressed the pour button
  - HEATING_STARTED           # heater turned on
  - HEATING_STOPPED           # heater turned off
  - TARGET_TEMPERATURE_CHANGED # potentiometer changed the target

# ===== RESPONSES =====
EventResponse:
  id: number
  type: EventType
  timestamp: string           # ISO 8601, e.g. "2026-05-31T12:00:00Z"

# ===== ENDPOINTS =====
# POST /events → 201 | 400
PostEvent:
  body: EventRequest
  returns: EventResponse
  errors:
    400: Validation failed (field errors map)

# GET /events → 200
GetEvents:
  returns: EventResponse[]    # ordered by timestamp DESC

# GET /events/latest → 200 | 404
GetLatestEvent:
  returns: EventResponse | 404


# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
# MATE SESSION
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~

# ===== REQUESTS =====
MateSessionRequest:
  sessionType: SessionType    # required
  totalPours: number | null   # optional; total button presses during the session

SessionType:
  - SYSTEM_STARTED
  - SYSTEM_STOPPED

# ===== RESPONSES =====
MateSessionResponse:
  id: number
  sessionType: SessionType
  totalPours: number | null
  createdAt: string           # ISO 8601, e.g. "2026-05-31T12:00:00Z"

# ===== ENDPOINTS =====
# POST /sessions → 201 | 400
#   Opens a new session. Fails with 500 if a SYSTEM_STARTED session already exists.
PostMateSession:
  body: MateSessionRequest    # sessionType must be SYSTEM_STARTED
  returns: MateSessionResponse

# POST /sessions/finish → 200 | 400
#   Closes the active session, updates totalPours, and triggers metric computation.
FinishMateSession:
  body: MateSessionRequest    # sessionType must be SYSTEM_STOPPED; totalPours required
  returns: void
  errors:
    409: No active (SYSTEM_STARTED) session found

# GET /sessions → 200
GetMateSessions:
  returns: MateSessionResponse[]   # ordered by createdAt DESC

# GET /sessions/latest → 200 | 404
GetLatestMateSession:
  returns: MateSessionResponse | 404