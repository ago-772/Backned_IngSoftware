openapi: 3.0.3
info:
  title: IoT Mate Device API
  description: >
    Backend API for the IoT Mate Device (ESP32-based).
    POST endpoints are consumed by the ESP32 firmware.
    GET endpoints are consumed by the frontend dashboard.
  version: 1.0.0

paths:

  # ===== TELEMETRY =====

  /telemetry:
    post:
      summary: Receive a telemetry reading from the ESP32
      description: >
        Persists a new sensor reading (temperature, target temperature, water level).
        Requires an active session (SYSTEM_STARTED) to exist; returns 409 otherwise.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TelemetryRequest'
      responses:
        '201':
          description: Reading saved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TelemetryResponse'
        '400':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

    get:
      summary: Get all telemetry readings ordered by most recent first
      responses:
        '200':
          description: List of readings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TelemetryResponse'

  /telemetry/latest:
    get:
      summary: Get the most recent telemetry reading
      responses:
        '200':
          description: Latest reading
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TelemetryResponse'
        '404':
          description: No readings found

  # ===== EVENTS =====

  /events:
    post:
      summary: Receive a discrete event from the ESP32
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventRequest'
      responses:
        '201':
          description: Event saved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventResponse'
        '400':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

    get:
      summary: Get all events ordered by most recent first
      responses:
        '200':
          description: List of events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EventResponse'

  /events/latest:
    get:
      summary: Get the most recent event
      responses:
        '200':
          description: Latest event
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventResponse'
        '404':
          description: No events found

  # ===== MATE SESSIONS =====

  /sessions:
    post:
      summary: Open a new mate session (SYSTEM_STARTED)
      description: >
        Called by the ESP32 when the system starts. Fails if a SYSTEM_STARTED session
        already exists (only one active session is allowed at a time).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MateSessionRequest'
      responses:
        '201':
          description: Session created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MateSessionResponse'
        '400':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

    get:
      summary: Get all mate sessions ordered by most recent first
      responses:
        '200':
          description: List of sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MateSessionResponse'

  /sessions/finish:
    post:
      summary: Close the active mate session (SYSTEM_STOPPED)
      description: >
        Called by the ESP32 when the system stops. Updates totalPours on the active
        session, marks it as SYSTEM_STOPPED, and triggers metric computation
        (average temperature, median temperature, anomaly count) via the observer pattern.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MateSessionRequest'
      responses:
        '200':
          description: Session closed and metrics computed
        '400':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

  /sessions/latest:
    get:
      summary: Get the most recent mate session
      responses:
        '200':
          description: Latest session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MateSessionResponse'
        '404':
          description: No sessions found

  # ===== METRICS =====

  /metrics:
    get:
      summary: Get all computed metrics ordered by most recent first
      description: Metrics are never created via REST — they are generated internally after a session closes.
      responses:
        '200':
          description: List of metrics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MetricResponse'

  /metrics/type/{type}:
    get:
      summary: Get all metrics of a given type ordered by most recent first
      parameters:
        - name: type
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/MetricType'
      responses:
        '200':
          description: List of metrics of the given type
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MetricResponse'

  /metrics/latest/{type}:
    get:
      summary: Get the most recent metric of a given type
      parameters:
        - name: type
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/MetricType'
      responses:
        '200':
          description: Latest metric of the given type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetricResponse'
        '404':
          description: No metrics found for the given type

components:
  schemas:

    # ===== TELEMETRY SCHEMAS =====

    TelemetryRequest:
      type: object
      required:
        - temperature
        - targetTemperature
        - waterLevel
      properties:
        temperature:
          type: number
          format: double
          minimum: 0.0
          maximum: 100.0
          description: Current water temperature measured by the sensor
        targetTemperature:
          type: number
          format: double
          minimum: 10.0
          maximum: 90.0
          description: Target temperature configured via the potentiometer
        waterLevel:
          type: number
          format: double
          minimum: 0.0
          maximum: 100.0
          description: Water level percentage detected by the sensor

    TelemetryResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        temperature:
          type: number
          format: double
        targetTemperature:
          type: number
          format: double
        waterLevel:
          type: number
          format: double
        sessionId:
          type: integer
          format: int64
          description: ID of the session this reading belongs to
        createdAt:
          type: string
          format: date-time

    # ===== EVENT SCHEMAS =====

    EventRequest:
      type: object
      required:
        - type
      properties:
        type:
          $ref: '#/components/schemas/EventType'

    EventResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        type:
          $ref: '#/components/schemas/EventType'
        timestamp:
          type: string
          format: date-time

    EventType:
      type: string
      enum:
        - POUR_MATE
        - HEATING_STARTED
        - HEATING_STOPPED
        - TARGET_TEMPERATURE_CHANGED

    # ===== MATE SESSION SCHEMAS =====

    MateSessionRequest:
      type: object
      required:
        - sessionType
      properties:
        sessionType:
          $ref: '#/components/schemas/SessionType'
        totalPours:
          type: integer
          nullable: true
          description: Total number of pour button presses during the session (required on finish)

    MateSessionResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        sessionType:
          $ref: '#/components/schemas/SessionType'
        totalPours:
          type: integer
          nullable: true
        createdAt:
          type: string
          format: date-time

    SessionType:
      type: string
      enum:
        - SYSTEM_STARTED
        - SYSTEM_STOPPED

    # ===== METRIC SCHEMAS =====

    MetricResponse:
      type: object
      properties:
        id:
          type: integer
        type:
          $ref: '#/components/schemas/MetricType'
        value:
          type: number
          format: double
        unit:
          type: string
          description: Unit of measurement (e.g. "°C", "count")
        createdAt:
          type: string
          format: date-time

    MetricType:
      type: string
      enum:
        - AVERAGE_TEMPERATURE
        - MEDIAN_TEMPERATURE
        - ANOMALY_COUNT

    # ===== SHARED =====

    ValidationError:
      type: object
      description: Map of field name → error message returned on 400 responses
      additionalProperties:
        type: string
      example:
        temperature: "must be less than or equal to 100.0"
        sessionType: "must not be null"